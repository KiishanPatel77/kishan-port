<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-        EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-   MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</head>
<style>
    .carousel-item img {
        height: 550px;
        object-fit: cover;
    }

  
</style>

<body>

    <nav class="navbar navbar-expand-sm bg-info navbar-dark ">
        <div class="container">
            <a href="#" class="navbar-brand text-white">Kishan Parsana</a>

            <button type="button" class="navbar-toggler" data-bs-target="#b1" data-bs-toggle="collapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="b1" class="collapse navbar-collapse">

                <ul class="navbar-nav ms-auto">
                    <li class="navbar-item">
                        <a href="#" class="nav-link active text-white">Home</a>
                    </li>

                    <li class="navbar-item">
                        <a href="#" class="nav-link text-white">About</a>
                    </li>


                    <li class="navbar-item">
                        <a href="#"  class="nav-link text-white">Content</a>
                    </li>

                    <li class="navbar-item">
                        <a href="#" class="nav-link text-white">Projects</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="carouselExampleFade" class="carousel slide carousel-fade" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://images.pexels.com/photos/872831/pexels-photo-872831.jpeg" class="d-block w-100"
                    alt="Lion">
            </div>

            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/1612351/pexels-photo-1612351.jpeg" class="d-block w-100"
                    alt="Nature">
            </div>

            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/9394275/pexels-photo-9394275.jpeg" class="d-block w-100"
                    alt="Mountain">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- content -->
        <div class="content">
            <div class="container mt-5 w-100">
                <div class="card p-4 shadow bg-light">

                <h3 class="mb-4 text-dark">Content Form</h3>

                <form>

                    <div class="mb-3">
                        <label class="form-label text-dark">Name</label>
                        <input type="text" class="form-control" name="name" placeholder="Enter your name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-dark">Content</label>
                        <input type="text" class="form-control" name="content" placeholder="Enter content">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-dark">Address</label>
                        <textarea class="form-control" name="address" rows="3" placeholder="Enter address"></textarea>
                    </div>
                    
                    
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                    
                </form>        
            </div>
        </div>

    </div>
</body>

</html>
